<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KlickPix | Checkout</title>
    <link rel="stylesheet" href="style.css?v=24.0">
    <script src="data.js?v=24.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="background: #0f172a; color: white; font-family: 'Syne', sans-serif; padding: 40px 20px;">
    <div style="max-width: 600px; margin: 0 auto;">
        <a href="index.html" style="text-decoration:none; color:white; font-weight:800; font-size:1.5rem;">Klick<span style="color:#e11d48;">Pix</span></a>
        <h1 style="letter-spacing:-2px; margin-top:20px;">Review Order</h1>
        <div id="cart-list" style="background:#1e293b; padding:20px; border-radius:12px; margin-bottom:20px; border:1px solid #334155;"></div>
        <div style="font-size: 2rem; font-weight: 800; display: flex; justify-content: space-between; margin-bottom: 30px; color: #22c55e;">
            <span>Total</span><span id="total-price">$0.00</span>
        </div>
        <div id="paypal-button-container"></div>
    </div>

    <script>
        const sb = supabase.createClient(window.KLICKPIX_CONFIG.SUPABASE_URL, window.KLICKPIX_CONFIG.SUPABASE_ANON_KEY);
        let cart = JSON.parse(localStorage.getItem('kp_cart')) || [];

        async function init() {
            if(cart.length === 0) { window.location.href = 'index.html'; return; }
            const { data: photos } = await sb.from('pe_photos').select('*').in('id', cart);
            document.getElementById('cart-list').innerHTML = photos.map(p => `
                <div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #334155;">
                    <span>Photo ID: ${p.id.slice(0,5)}</span>
                    <span>$${window.KLICKPIX_CONFIG.PRICE_PER_PHOTO.toFixed(2)}</span>
                </div>`).join('');
            const total = (photos.length * window.KLICKPIX_CONFIG.PRICE_PER_PHOTO).toFixed(2);
            document.getElementById('total-price').innerText = `$${total}`;

            const script = document.createElement('script');
            script.src = `https://www.paypal.com/sdk/js?client-id=${window.KLICKPIX_CONFIG.PAYPAL_CLIENT_ID}&currency=${window.KLICKPIX_CONFIG.CURRENCY_CODE}`;
            script.onload = () => {
                paypal.Buttons({
                    createOrder: (data, actions) => actions.order.create({ purchase_units: [{ amount: { value: total } }] }),
                    onApprove: (data, actions) => actions.order.capture().then(() => {
                        sessionStorage.setItem('kp_last_purchase', JSON.stringify(cart));
                        localStorage.removeItem('kp_cart');
                        window.location.href = 'success.html';
                    })
                }).render('#paypal-button-container');
            };
            document.head.appendChild(script);
        }
        init();
    </script>
</body>
</html>
