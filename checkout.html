<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KlickPix | Checkout</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="logo">KLICK<span>PIX</span> CHECKOUT</div>
    </header>
    <main class="container">
        <div class="admin-panel" style="max-width: 600px; margin: 0 auto; text-align: center;">
            <h2 style="font-family: 'Syne', sans-serif; margin-bottom: 1rem;">Confirm Your Purchase</h2>
            <div id="orderSummary" style="margin-bottom: 2rem; padding: 1rem; border: 1px solid #eee; border-radius: 8px;">
                Loading your Pix...
            </div>
            <button class="btn btn-brand" style="width: 100%;">Pay with PayPal</button>
            <p style="margin-top: 1rem; font-size: 0.8rem; opacity: 0.5;">Secure Instant Download after Payment.</p>
        </div>
    </main>
    <script src="data.js"></script>
</body>
</html>
