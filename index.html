<!DOCTYPE html>
<html lang="en">
<head>
    <script>if (localStorage.getItem('kp_access') !== 'true') { window.location.href = 'landing.html'; }</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KlickPix | Events</title>
    <link rel="stylesheet" href="style.css?v=16.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="data.js?v=16.0"></script>
    <style>
        body { background: #0f172a; font-family: 'Syne', sans-serif; color: white; padding: 40px 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .logo { font-size: 2.5rem; font-weight: 800; letter-spacing: -2px; margin-bottom: 40px; color: #ffffff; }
        .logo span { color: #e11d48; }
        .event-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .event-card { background: #1e293b; padding: 30px; border-radius: 12px; text-decoration: none; color: white; border: 1px solid #334155; transition: border-color 0.2s; }
        .event-card:hover { border-color: #e11d48; }
        .event-card h2 { margin: 0 0 10px 0; font-size: 1.5rem; letter-spacing: -1px; }
        .event-card p { color: #64748b; margin: 0; font-weight: 600; font-size: 0.8rem; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">Klick<span>Pix</span></div>
        <div id="event-grid" class="event-grid"></div>
    </div>
    <script>
        const sb = supabase.createClient(window.KLICKPIX_CONFIG.SUPABASE_URL, window.KLICKPIX_CONFIG.SUPABASE_ANON_KEY);
        async function init() {
            const { data } = await sb.from('pe_galleries').select('*').order('created_at', { ascending: false });
            document.getElementById('event-grid').innerHTML = data.map(g => `
                <a href="gallery.html?id=${g.id}" class="event-card">
                    <p>${new Date(g.created_at).toLocaleDateString()}</p>
                    <h2>${g.title}</h2>
                </a>`).join('');
        }
        init();
    </script>
</body>
</html>
