<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KlickPix Entrance</title>
    <script src="data.js?v=50.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; padding-top: 20vh; margin: 0; }
        .logo { font-size: 4rem; font-weight: 900; }
        .logo span { color: #e11d48; }
        .btn { 
            display: none; padding: 25px 50px; background: #e11d48; 
            color: white; text-decoration: none; font-weight: bold; border-radius: 12px;
            font-size: 1.5rem; margin-top: 40px; box-shadow: 0 10px 30px rgba(225, 29, 72, 0.3);
        }
        #status { color: #64748b; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <h1 class="logo">Klick<span>Pix</span></h1>
    <p>Instant High-Resolution Memories</p>
    
    <div id="status">Locating "Bring a Friend"...</div>
    <a href="#" id="enter-link" class="btn">VIEW BRING A FRIEND PHOTOS</a>

    <script>
        window.addEventListener('load', async () => {
            const conf = window.KLICKPIX_CONFIG;
            const status = document.getElementById('status');
            const btn = document.getElementById('enter-link');
            
            try {
                const sb = supabase.createClient(conf.SUPABASE_URL, conf.SUPABASE_ANON_KEY);
                
                // Search by title instead of requiring the ID string
                const { data: galleries, error } = await sb
                    .from('pe_galleries')
                    .select('id')
                    .ilike('title', '%Bring a Friend%')
                    .limit(1);

                if (error) throw error;

                if (galleries && galleries.length > 0) {
                    btn.href = `gallery.html?id=${galleries[0].id}`;
                    btn.style.display = 'inline-block';
                    status.style.display = 'none';
                } else {
                    status.innerText = "Gallery 'Bring a Friend' not found in Supabase.";
                }
            } catch (e) {
                status.innerHTML = "Connection Error.<br><small style='color:#e11d48'>" + e.message + "</small>";
            }
        });
    </script>
</body>
</html>
