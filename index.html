<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KlickPix | Premium Event Photography</title>
    <link rel="stylesheet" href="style.css?v=44.0">
    <script src="data.js?v=44.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0f172a; color: white; font-family: 'Syne', sans-serif; margin: 0; padding: 0; }
        header { padding: 60px 20px; text-align: center; background: linear-gradient(to bottom, #1e293b, #0f172a); }
        .logo { font-size: 3.5rem; font-weight: 900; letter-spacing: -4px; margin: 0; }
        .logo span { color: #e11d48; }
        .tagline { color: #94a3b8; font-size: 1.1rem; font-weight: 600; margin-top: 10px; text-transform: uppercase; letter-spacing: 2px; }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        .section-title { font-size: 1.5rem; font-weight: 800; margin-bottom: 30px; border-left: 4px solid #e11d48; padding-left: 15px; }
        
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 30px; }
        .gallery-card { background: #1e293b; border-radius: 16px; overflow: hidden; border: 1px solid #334155; text-decoration: none; transition: 0.3s; }
        .gallery-card:hover { transform: translateY(-10px); border-color: #e11d48; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        
        .card-img { width: 100%; height: 200px; background: #000; position: relative; overflow: hidden; }
        .card-img img { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; transition: 0.3s; }
        .gallery-card:hover .card-img img { opacity: 1; transform: scale(1.05); }
        
        .card-content { padding: 25px; }
        .card-title { font-size: 1.25rem; font-weight: 800; color: white; margin: 0; }
        .card-meta { color: #64748b; font-size: 0.85rem; margin-top: 5px; font-weight: 700; text-transform: uppercase; }
        
        footer { padding: 60px 20px; text-align: center; color: #475569; font-size: 0.9rem; font-weight: 600; }
    </style>
</head>
<body>

    <header>
        <h1 class="logo">Klick<span>Pix</span></h1>
        <p class="tagline">Instant High-Resolution Memories</p>
    </header>

    <div class="container">
        <h2 class="section-title">Open Galleries</h2>
        <div id="gallery-list" class="gallery-grid">
            <p style="color:#64748b;">Connecting to the vault...</p>
        </div>
    </div>

    <footer>
        &copy; 2026 KlickPix. Built with Trust, Integrity, and Simplicity.
    </footer>

    <script>
        window.addEventListener('load', async () => {
            const conf = window.KLICKPIX_CONFIG;
            const sb = supabase.createClient(conf.SUPABASE_URL, conf.SUPABASE_ANON_KEY);
            const list = document.getElementById('gallery-list');

            try {
                // Fetch active galleries
                const { data: galleries, error } = await sb.from('pe_galleries').select('*').order('created_at', { ascending: false });

                if (error) throw error;

                if (galleries && galleries.length > 0) {
                    list.innerHTML = galleries.map(g => `
                        <a href="gallery.html?id=${g.id}" class="gallery-card">
                            <div class="card-img">
                                <img src="https://ushkmoccmhebnjfoubxv.supabase.co/storage/v1/object/public/photos/ui/gallery-cover.jpg" onerror="this.src='https://images.unsplash.com/photo-1492684223066-81342ee5ff30?auto=format&fit=crop&w=800&q=80'">
                            </div>
                            <div class="card-content
