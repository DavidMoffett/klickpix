<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KlickPix | Official Gallery</title>
    <script src="data.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://www.paypal.com/sdk/js?client-id=Ad_2vFmXz5S0vHw2mQ9E_B3sQv6lY_p7-R3U8zX_G_W_C1_D&currency=NZD"></script>
    <style>
        body { background: #0f172a; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; padding-bottom: 120px; }
        .logo { font-size: 3rem; font-weight: 900; text-align: center; margin: 30px 0; letter-spacing: -3px; }
        .logo span { color: #e11d48; }
        
        /* 5-WIDE CONFIGURATION */
        .container { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; max-width: 1400px; margin: 0 auto; }
        
        .card { background: #1e293b; border-radius: 8px; overflow: hidden; position: relative; border: 1px solid #334155; cursor: pointer; transition: 0.2s; }
        .card:hover { transform: scale(1.02); border-color: #e11d48; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block; }
        
        .gallery-label { padding: 15px; text-align: center; font-weight: bold; background: #1e293b; }

        /* VIEWER / SLIDESHOW */
        .viewer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .viewer img { max-height: 80vh; max-width: 90%; box-shadow: 0 0 50px rgba(0,0,0,1); }
        .viewer-nav { position: absolute; top: 50%; width: 100%; display: flex; justify-content: space-between; padding: 0 30px; box-sizing: border-box; pointer-events: none; }
        .nav-btn { pointer-events: auto; background: rgba(225, 29, 72, 0.7); color: white; border: none; padding: 20px; cursor: pointer; font-size: 1.5rem; border-radius: 50%; }

        /* MODERATE ACTION BANNER */
        .action-banner { position: absolute; bottom: 0; width: 100%; background: #1e293b; border-top: 2px solid #e11d48; padding: 20px; display: flex; justify-content: center; gap: 15px; }
        .btn { padding: 12px 25px; border-radius: 6px; font-weight: bold; cursor: pointer; border: none; text-transform: uppercase; }
        .btn-buy { background: #e11d48; color: white; }
        .btn-back { background: #334155; color: white; }

        /* CHECKOUT BAR */
        .checkout-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e293b; border: 2px solid #e11d48; padding: 20px; border-radius: 15px; display: none; z-index: 3000; min-width: 320px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        .admin-link { position: fixed; bottom: 15px; right: 15px; opacity: 0.2; color: white; text-decoration: none; font-size: 0.7rem; }
    </style>
</head>
<body>

    <div class="logo">Klick<span>Pix</span></div>
    
    <div id="viewControl" style="text-align:center; margin-bottom: 20px; display:none;">
        <button onclick="loadGalleries()" class="btn btn-back">← Back to All Galleries</button>
    </div>

    <div id="mainDisplay" class="container"></div>

    <div id="viewer" class="viewer">
        <img id="viewerImg" src="">
        <div class="viewer-nav">
            <button class="nav-btn" onclick="changeSlide(-1)">❮</button>
            <button class="nav-btn" onclick="changeSlide(1)">❯</button>
        </div>
        <div class="action-banner">
            <button class="btn btn-buy" onclick="addToCart()">Buy Photo ($20)</button>
            <button class="btn btn-back" onclick="closeViewer()">Back to Gallery</button>
        </div>
    </div>

    <div id="checkoutBar" class="checkout-bar">
        <div id="cartStatus" style="text-align:center; margin-bottom:15px; font-weight:bold;">0 Photos Selected</div>
        <div id="paypal-button-container"></div>
        <button onclick="clearCart()" style="width:100%; background:none; border:none; color:#64748b; margin-top:10px; cursor:pointer;">Cancel & Clear Cart</button>
    </div>

    <a href="admin.html" class="admin-link">Admin</a>

    <script>
        const conf = window.KLICKPIX_CONFIG;
        const sb = supabase.createClient(conf.SUPABASE_URL, conf.SUPABASE_ANON_KEY);
        let currentPhotos = [];
        let currentIndex = 0;
        let cart = [];

        async function loadGalleries() {
            document.getElementById('viewControl').style.display = 'none';
            const { data: galleries } = await sb.from('pe_galleries').select('*').order('created_at', { ascending: false });
            const display = document.getElementById('mainDisplay');
            display.innerHTML = galleries.map(g => `
                <div class="card" onclick="loadPhotos('${g.id}')">
                    <div style="height:200px; display:flex; align-items:center; justify-content:center; background:#0f172a; color:#e11d48; font-size:3rem;">📁</div>
                    <div class="gallery-label">${g.title}</div>
                </div>
            `).join('');
        }

        async function loadPhotos(galleryId) {
            document.getElementById('viewControl').style.display = 'block';
            const { data: photos } = await sb.from('pe_photos').select('*').eq('gallery_id', galleryId);
            currentPhotos = photos;
            const display = document.getElementById('mainDisplay');
            display.innerHTML = photos.map((p, index) => `
                <div class="card" onclick="openViewer(${index})">
                    <img src="${p.preview_url}">
                </div>
            `).join('');
        }

        function openViewer(index) {
            currentIndex = index;
            document.getElementById('viewerImg').src = currentPhotos[currentIndex].preview_url;
            document.getElementById('viewer').style.display = 'flex';
        }

        function closeViewer() { document.getElementById('viewer').style.display = 'none'; }

        function changeSlide(step) {
            currentIndex = (currentIndex + step + currentPhotos.length) % currentPhotos.length;
            document.getElementById('viewerImg').src = currentPhotos[currentIndex].preview_url;
        }

        function addToCart() {
            const photo = currentPhotos[currentIndex];
            if(!cart.find(x => x.id === photo.id)) {
                cart.push(photo);
                updateCartUI();
            }
            closeViewer();
        }

        function updateCartUI() {
            const bar = document.getElementById('checkoutBar');
            if(cart.length > 0) {
                bar.style.display = 'block';
                const total = (cart.length * 20).toFixed(2);
                document.getElementById('cartStatus').innerText = `${cart.length} Photos Selected ($${total})`;
                renderPaypal(total);
            } else { bar.style.display = 'none'; }
        }

        function renderPaypal(total) {
            document.getElementById('paypal-button-container').innerHTML = '';
            paypal.Buttons({
                createOrder: (d, a) => a.order.create({ purchase_units: [{ amount: { value: total } }] }),
                onApprove: (d, a) => a.order.capture().then(() => {
                    alert("Payment Successful! Your download links are being sent to your email.");
                    clearCart();
                })
            }).render('#paypal-button-container');
        }

        function clearCart() { cart = []; updateCartUI(); }

        loadGalleries();
    </script>
</body>
</html>
