<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KlickPix | Sports Photography</title>
    <link rel="stylesheet" href="style.css?v=6.3">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="data.js?v=6.3"></script>
    <style>
        body { background: #0f172a; margin: 0; padding: 60px 20px; font-family: 'Syne', sans-serif; min-height: 100vh; position: relative; }
        .container { max-width: 1800px; margin: 0 auto; padding-bottom: 100px; }
        
        /* Centered Branding */
        .brand-header { margin-bottom: 80px; text-align: center; }
        .brand-header h1 { 
            font-size: 6rem; 
            letter-spacing: -6px; 
            margin: 0; 
            line-height: 0.8; 
            font-weight: 800;
            text-transform: none; /* Keeps K and P as specified */
        }
        .text-white { color: #ffffff; }
        .text-red { color: #e11d48; }

        .hero-grid { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 15px; 
        }

        .event-card { 
            background: #1e293b; 
            border-radius: 16px; 
            overflow: hidden; 
            text-decoration: none; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            aspect-ratio: 4/5;
            display: flex;
            flex-direction: column;
            border: 1px solid #334155;
            position: relative;
        }

        .event-card:hover { transform: translateY(-10px); border-color: #e11d48; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }

        .cover-img { 
            flex: 1;
            width: 100%; 
            background-size: cover; 
            background-position: center; 
        }

        .card-content { 
            padding: 25px; 
            background: linear-gradient(transparent, rgba(15, 23, 42, 0.95));
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
        }

        .card-title { 
            margin: 0; 
            font-size: 1.2rem; 
            color: white; 
            letter-spacing: -1px;
            text-transform: uppercase;
            font-weight: 800;
        }

        /* Ghost Admin Button */
        .admin-link {
            position: fixed;
            bottom: 20px;
            right: 20px;
            color: #1e293b; /* Blends with bg */
            text-decoration: none;
            font-weight: 800;
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.15; /* Barely visible */
            transition: all 0.3s;
        }
        .admin-link:hover { opacity: 1; color: #e11d48; }

        @media (max-width: 1400px) { .hero-grid { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 1100px) { .hero-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 768px) { 
            .hero-grid { grid-template-columns: repeat(2, 1fr); } 
            .brand-header h1 { font-size: 4rem; letter-spacing: -4px; } 
        }
    </style>
</head>
<body>

<div class="container">
    <div class="brand-header">
        <h1><span class="text-white">Klick</span><span class="text-red">Pix</span></h1>
    </div>

    <div id="event-grid" class="hero-grid">
        </div>
</div>

<a href="admin.html" class="admin-link">Command Centre</a>

<script>
    const sb = supabase.createClient(window.KLICKPIX_CONFIG.SUPABASE_URL, window.KLICKPIX_CONFIG.SUPABASE_ANON_KEY);

    async function loadHeroGrid() {
        const grid = document.getElementById('event-grid');
        const { data: galleries } = await sb
            .from('pe_galleries')
            .select('*')
            .eq('is_live', true)
            .order('created_at', { ascending: false });

        if (!galleries || galleries.length === 0) return;

        let html = '';
        for (const g of galleries) {
            const { data: photos } = await sb
                .from('pe_photos')
                .select('preview_url')
                .eq('gallery_id', g.id)
                .limit(1);

            const img = (photos && photos.length > 0) ? photos[0].preview_url : '';
            
            html += `
                <a href="gallery.html?id=${g.id}" class="event-card">
                    <div class="cover-img" style="background-image: url('${img}')"></div>
                    <div class="card-content">
                        <h3 class="card-title">${g.title}</h3>
                    </div>
                </a>`;
        }
        grid.innerHTML = html;
    }

    loadHeroGrid();
</script>
</body>
</html>
