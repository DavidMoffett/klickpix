Set-Content index.html '<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KlickPix | Live</title>
    <script src="data.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://www.paypal.com/sdk/js?client-id=Ad_2vFmXz5S0vHw2mQ9E_B3sQv6lY_p7-R3U8zX_G_W_C1_D&currency=NZD"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; }
        .card { background: #1e293b; border-radius: 8px; overflow: hidden; cursor: pointer; border: 1px solid #334155; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .viewer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .viewer img { max-height: 80vh; max-width: 90%; }
        .banner { background: #e11d48; padding: 20px; width: 100%; position: absolute; bottom: 0; display: flex; justify-content: center; gap: 20px; }
    </style>
</head>
<body>
    <h1 style="text-align:center">Klick<span>Pix</span></h1>
    <div id="mainGrid" class="grid"></div>
    <div id="viewer" class="viewer">
        <img id="vImg" src="">
        <div class="banner">
            <button onclick="buy()" style="padding:10px 20px; font-weight:bold; cursor:pointer;">BUY PHOTO $20</button>
            <button onclick="closeV()" style="padding:10px 20px; cursor:pointer;">BACK</button>
        </div>
    </div>
    <script>
        const conf = window.KLICKPIX_CONFIG;
        const sb = supabase.createClient(conf.SUPABASE_URL, conf.SUPABASE_ANON_KEY);
        async function load() {
            const { data: g } = await sb.from("pe_galleries").select("id").limit(1).single();
            if(!g) return;
            const { data: photos } = await sb.from("pe_photos").select("*").eq("gallery_id", g.id);
            document.getElementById("mainGrid").innerHTML = photos.map(p => `
                <div class="card" onclick="view(\'${p.preview_url}\')">
                    <img src="${p.preview_url}">
                </div>`).join("");
        }
        function view(u) { document.getElementById("vImg").src = u; document.getElementById("viewer").style.display = "flex"; }
        function closeV() { document.getElementById("viewer").style.display = "none"; }
        load();
    </script>
</body>
</html>'
