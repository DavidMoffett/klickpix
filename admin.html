<div style="background:#f8fafc; padding:20px; border-radius:16px; margin-top:15px; border:1px solid #e2e8f0; display:grid; grid-template-columns: 1fr 1fr 1fr; gap:15px;">
    <div>
        <label style="font-size:0.7rem; font-weight:800; color:#64748b;">WATERMARK TEXT</label><br>
        <input type="text" id="wmText" value="KlickPix" style="width:100%;">
    </div>
    <div>
        <label style="font-size:0.7rem; font-weight:800; color:#64748b;">COLOUR</label><br>
        <input type="color" id="wmColor" value="#FFFFFF" style="width:100%; height:45px;">
    </div>
    <div>
        <label style="font-size:0.7rem; font-weight:800; color:#64748b;">OPACITY (0.1 - 1.0)</label><br>
        <input type="number" id="wmOpacity" value="0.3" step="0.1" min="0.1" max="1" style="width:100%;">
    </div>
</div>

<script>
// Update your makeGallery function to include these:
async function makeGallery() {
    const title = document.getElementById('gName').value;
    const price = document.getElementById('gPrice').value;
    const wmText = document.getElementById('wmText').value;
    const wmColor = document.getElementById('wmColor').value;
    const wmOpacity = document.getElementById('wmOpacity').value;

    if (!title) return;

    await sb.from('pe_galleries').insert([{ 
        title, 
        default_price: price, 
        watermark_text: wmText,
        watermark_color: wmColor,
        watermark_opacity: wmOpacity,
        is_live: false 
    }]);
    refreshUI();
}
</script>
