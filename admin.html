<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KlickPix Admin | Command Centre</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="background: #f3f4f6;">

    <header class="header">
        <div class="logo">KLICK<span>PIX</span> ADMIN</div>
    </header>

    <div id="statsBar" style="background: #111827; color: white; padding: 1rem; display: flex; justify-content: space-around; font-size: 0.9rem; font-weight: bold; text-transform: uppercase; letter-spacing: 1px;">
        <div>Total Visits: <span id="totalVisits">0</span></div>
        <div>Total Sales: <span id="totalSales">0</span></div>
        <div>Total Revenue: <span id="totalRevenue">$0.00</span></div>
    </div>

    <main class="container">
        <section style="background: white; padding: 1.5rem; border-radius: 12px; margin-bottom: 2rem; border: 1px solid #e5e7eb;">
            <h3 style="margin-bottom: 1rem; font-family: 'Syne';">Create New Event</h3>
            <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
                <input type="text" id="newTitle" placeholder="Event Name" style="padding: 0.5rem; flex: 1;">
                <input type="number" id="newPrice" placeholder="Photo Price (NZD)" style="padding: 0.5rem; width: 140px;">
                <button class="btn btn-primary" onclick="handleCreateEvent()">Create Event</button>
            </div>
        </section>

        <div id="adminGalleryList">
            </div>
    </main>

    <script src="data.js"></script>
    <script src="admin.js"></script>
</body>
</html>
