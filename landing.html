<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KlickPix | Welcome</title>
    <link rel="stylesheet" href="style.css?v=16.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="data.js?v=16.0"></script>
    <style>
        body { background: #0f172a; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; font-family: 'Syne', sans-serif; color: white; }
        .gate-card { width: 100%; max-width: 400px; padding: 40px; text-align: center; }
        .logo { font-size: 3.5rem; font-weight: 800; letter-spacing: -3px; margin-bottom: 10px; color: #ffffff; }
        .logo span { color: #e11d48; }
        p { color: #64748b; margin-bottom: 30px; font-weight: 600; font-size: 0.9rem; }
        .input-group { margin-bottom: 18px; text-align: left; }
        label { display: block; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; margin-bottom: 6px; color: #94a3b8; letter-spacing: 1.5px; }
        input { width: 100%; background: #1e293b; border: 1px solid #334155; padding: 14px; border-radius: 8px; color: white; font-family: inherit; box-sizing: border-box; font-size: 1rem; }
        input:focus { border-color: #e11d48; outline: none; }
        .enter-btn { width: 100%; background: #e11d48; color: white; border: none; padding: 18px; border-radius: 8px; font-weight: 800; font-size: 1rem; cursor: pointer; margin-top: 15px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="gate-card">
        <div class="logo">Klick<span>Pix</span></div>
        <p>Please provide your details to unlock the event galleries.</p>
        <div class="input-group">
            <label>Full Name</label>
            <input type="text" id="lead-name" placeholder="Full Name">
        </div>
        <div class="input-group">
            <label>Email Address</label>
            <input type="email" id="lead-email" placeholder="email@address.com">
        </div>
        <div class="input-group">
            <label>Phone Number</label>
            <input type="tel" id="lead-phone" placeholder="021 000 000">
        </div>
        <button class="enter-btn" onclick="captureLead()">Unlock Galleries</button>
    </div>
    <script>
        const sb = supabase.createClient(window.KLICKPIX_CONFIG.SUPABASE_URL, window.KLICKPIX_CONFIG.SUPABASE_ANON_KEY);
        async function captureLead() {
            const n = document.getElementById('lead-name').value;
            const e = document.getElementById('lead-email').value;
            const p = document.getElementById('lead-phone').value;
            if (!n || !e || !p) { alert("All fields required."); return; }
            const { error } = await sb.from('pe_leads').insert([{ full_name: n, email: e, phone: p }]);
            if (!error) { localStorage.setItem('kp_access', 'true'); window.location.href = 'index.html'; }
            else { alert("Sync error. Please try again."); }
        }
    </script>
</body>
</html>
