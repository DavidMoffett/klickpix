<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success | KlickPix</title>
    <script src="data.js?v=27.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="background: #0f172a; color: white; font-family: 'Syne', sans-serif; padding: 40px; text-align: center;">
    <h1>Payment Successful!</h1>
    <p>Your photos are ready for download:</p>
    <div id="dl" style="margin-top:40px; max-width: 500px; margin: 40px auto;"></div>
    <a href="index.html" style="color:#64748b; text-decoration:none;">Back to Gallery</a>

    <script>
        const sb = supabase.createClient(window.KLICKPIX_CONFIG.SUPABASE_URL, window.KLICKPIX_CONFIG.SUPABASE_ANON_KEY);
        async function init() {
            const ids = JSON.parse(sessionStorage.getItem('kp_last_purchase')) || [];
            if (ids.length === 0) return;
            const { data: photos } = await sb.from('pe_photos').select('*').in('id', ids);
            if(photos) {
                document.getElementById('dl').innerHTML = photos.map(p => `
                    <div style="background:#1e293b; padding:15px; border-radius:8px; margin-bottom:10px; display:flex; align-items:center; justify-content:space-between; border:1px solid #334155;">
                        <img src="${p.preview_url}" width="50" style="border-radius:4px;">
                        <a href="${p.high_res_url}" download style="background:#22c55e; color:white; padding:8px 15px; border-radius:4px; font-weight:800; text-decoration:none;">DOWNLOAD</a>
                    </div>`).join('');
            }
        }
        init();
    </script>
</body>
</html>
