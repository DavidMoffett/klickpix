<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        // Security Gate: Ensure they entered through the landing page
        if (localStorage.getItem('kp_access') !== 'true') { window.location.href = 'landing.html'; }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KlickPix | Gallery</title>
    <link rel="stylesheet" href="style.css?v=22.0">
    <script src="data.js?v=22.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0f172a; color: white; font-family: 'Syne', sans-serif; padding: 40px 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .logo { font-size: 2rem; font-weight: 800; color: white; text-decoration: none; display: block; margin-bottom: 40px; }
        .logo span { color: #e11d48; }
        
        .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .photo-card { background: #1e293b; border-radius: 12px; overflow: hidden; border: 1px solid #334155; position: relative; }
        .photo-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block; }
        
        .info-panel { padding: 15px; display: flex; justify-content: space-between; align-items: center; background: #1e293b; }
        .photo-id { font-size: 0.8rem; font-weight: 700; color: #64748b; }
        
        .btn-add { background: #334155; color: white; border: none; padding: 10px 18px; border-radius: 6px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .btn-add.in-cart { background: #e11d48; }
        
        /* The Floating Cart Button */
        .cart-bar { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); 
            background: #22c55e; color: white; padding: 15px 40px; border-radius: 50px; 
            text-decoration: none; font-weight: 800; font-size: 1.1rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: none; z-index: 1000;
            border: 2px solid rgba(255,255,255,0.2);
        }
        
        .watermark { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-45deg); font-size: 2rem; font-weight: 900; color: rgba(255,255,255,0.1); pointer-events: none; white-space: nowrap; }
    </style>
</head>
<body>

    <div class="container">
        <a href="index.html" class="logo">Klick<span>Pix</span></a>
        <h1 id="gallery-title" style="margin-bottom:40px; letter-spacing: -3px; font-size: 3rem;">Loading...</h1>
        
        <div id="photo-grid" class="photo-grid">
            </div>
    </div>

    <a href="checkout.html" id="cart-float" class="cart-bar">VIEW CART & CHECKOUT</a>

    <script>
        const sb = supabase.createClient(window.KLICKPIX_CONFIG.SUPABASE_URL, window.KLICKPIX_CONFIG.SUPABASE_ANON_KEY);
        const urlParams = new URLSearchParams(window.location.search);
        const gId = urlParams.get('id');
        let cart = JSON.parse(localStorage.getItem('kp_cart')) || [];

        async function initGallery() {
            if (!gId) { document.getElementById('gallery-title').innerText = "Gallery Not Found"; return; }

            // 1. Get Gallery Title
            const { data: gallery } = await sb.from('pe_galleries').select('*').eq('id', gId).single();
            if (gallery) document.getElementById('gallery-title').innerText = gallery.title;

            // 2. Get Photos
            const { data: photos } = await sb.from('pe_photos').select('*').eq('gallery_id', gId).order('created_at', { ascending: true });
            
            if (photos) {
                renderPhotos(photos);
                updateCartUI();
            }
        }

        function renderPhotos(photos) {
            const grid = document.getElementById('photo-grid');
            grid.innerHTML = photos.map((p, i) => {
                const inCart = cart.includes(p.id);
                return `
                    <div class="photo-card">
                        <div class="watermark">KLICKPIX</div>
                        <img src="${p.preview_url}" oncontextmenu="return false;">
                        <div class="info-panel">
                            <span class="photo-id">PHOTO #${i+1}</span>
                            <button class="btn-add ${inCart ? 'in-cart' : ''}" onclick="toggleCart('${p.id}')">
                                ${inCart ? 'REMOVE' : 'ADD TO CART'}
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function toggleCart(id) {
            const index = cart.indexOf(id);
            if (index > -1) {
                cart.splice(index, 1);
            } else {
                cart.push(id);
            }
            localStorage.setItem('kp_cart', JSON.stringify(cart));
            updateCartUI();
            // Refresh buttons without reloading the whole page (The Mpishi way)
            const btn = document.querySelector(`button[onclick="toggleCart('${id}')"]`);
            if (btn) {
                btn.classList.toggle('in-cart');
                btn.innerText = cart.includes(id) ? 'REMOVE' : 'ADD TO CART';
            }
        }

        function updateCartUI() {
            const bar = document.getElementById('cart-float');
            if (cart.length > 0) {
                bar.style.display = 'block';
                bar.innerText = `VIEW CART (${cart.length} PHOTOS) & CHECKOUT`;
            } else {
                bar.style.display = 'none';
            }
        }

        initGallery();
    </script>
</body>
</html>
