<!DOCTYPE html>
<html lang="en">
<head>
    <script>if (localStorage.getItem('kp_access') !== 'true') { window.location.href = 'landing.html'; }</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KlickPix | Gallery</title>
    <link rel="stylesheet" href="style.css?v=17.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://www.paypal.com/sdk/js?client-id=YOUR_PAYPAL_CLIENT_ID&currency=NZD"></script>
    <script src="data.js?v=17.0"></script>
    <style>
        body { background: #0f172a; font-family: 'Syne', sans-serif; color: white; padding: 40px 20px; }
        .container { max-width: 1600px; margin: 0 auto; }
        .logo { font-size: 1.8rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 20px; color: #ffffff; text-decoration:none; display:inline-block; }
        .logo span { color: #e11d48; }
        .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .photo-card { background: #1e293b; border-radius: 8px; overflow: hidden; position: relative; border: 1px solid #334155; }
        .photo-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block; }
        .info-panel { padding: 12px; display: flex; justify-content: space-between; align-items: center; }
        .img-no { font-size: 0.8rem; font-weight: 800; color: #94a3b8; }
        
        /* The Buttons */
        .add-btn { background: #334155; color: white; border: none; padding: 8px 14px; border-radius: 4px; font-weight: 800; font-size: 0.65rem; cursor: pointer; }
        .add-btn.in-cart { background: #e11d48; }
        .download-btn { background: #22c55e; color: white; border: none; padding: 8px 14px; border-radius: 4px; font-weight: 800; font-size: 0.65rem; cursor: pointer; text-decoration: none; }
        
        .watermark-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; opacity: 0.35; z-index: 5; display: flex; flex-wrap: wrap; justify-content: center; align-content: center; overflow: hidden; }
        .wm-text { transform: rotate(-45deg); white-space: nowrap; font-weight: 900; font-size: 1.2rem; text-transform: uppercase; }
        
        /* Success Overlay */
        #payment-success { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(15, 23, 42, 0.98); z-index:9999; align-items:center; justify-content:center; }
    </style>
</head>
<body>
    <div id="payment-success">
        <div style="background:#1e293b; padding:40px; border-radius:12px; border:2px solid #22c55e; max-width:400px; text-align:center;">
            <h2 style="margin-bottom:10px;">Success!</h2>
            <p style="color:#94a3b8; margin-bottom:30px;">Payment received. You can now download your high-res photos directly from the gallery.</p>
            <button onclick="closeSuccess()" style="background:#22c55e; color:white; border:none; padding:15px 30px; border-radius:8px; font-weight:800; cursor:pointer; width:100%;">ACCESS DOWNLOADS</button>
        </div>
    </div>

    <a href="index.html" class="logo">Klick<span>Pix</span></a>
    <div id="paypal-container" style="max-width:300px; margin-bottom:20px;"></div>

    <div class="container">
        <h1 id="gallery-title" style="letter-spacing:-2px; margin-bottom:40px;">Loading...</h1>
        <div id="photo-grid" class="photo-grid"></div>
    </div>

    <script>
        const sb = supabase.createClient(window.KLICKPIX_CONFIG.SUPABASE_URL, window.KLICKPIX_CONFIG.SUPABASE_ANON_KEY);
        const urlParams = new URLSearchParams(window.location.search);
        const gId = urlParams.get('id');
        let photoData = [], cart = JSON.parse(localStorage.getItem('kp_cart')) || [], wmHTML = '';
        let isPaid = localStorage.getItem('kp_paid_id') === gId; // Check if this specific gallery is paid

        async function init() {
            if (!gId) return;
            const { data: g } = await sb.from('pe_galleries').select('*').eq('id', gId).single();
            if (!g) return;
            document.getElementById('gallery-title').innerText = g.title;
            const label = g.watermark_text || 'KlickPix';
            wmHTML = `<div class="wm-text" style="color:${g.watermark_color || '#FFFFFF'};">${new Array(12).fill(label).join(' &nbsp; ')}</div>`.repeat(10);
            
            const { data: photos } = await sb.from('pe_photos').select('*').eq('gallery_id', gId).order('created_at', { ascending: true });
            photoData = photos || [];
            renderGrid();
            if (!isPaid) setupPayPal();
        }

        function renderGrid() {
            document.getElementById('photo-grid').innerHTML = photoData.map((p, i) => {
                const inCart = cart.includes(p.id);
                // IF PAID: Show Download Button. IF NOT: Show Add to Cart.
                const buttonHTML = isPaid 
                    ? `<a href="${p.high_res_url}" download="KlickPix_${i+1}.jpg" class="download-btn">DOWNLOAD</a>`
                    : `<button id="btn-${p.id}" class="add-btn ${inCart ? 'in-cart' : ''}" onclick="toggleCart('${p.id}')">${inCart ? 'ADDED' : 'ADD TO CART'}</button>`;

                return `<div class="photo-card">
                    ${isPaid ? '' : `<div class="watermark-overlay">${wmHTML}</div>`}
                    <img src="${p.preview_url}" oncontextmenu="return false;">
                    <div class="info-panel">
                        <span class="img-no">PHOTO #${i+1}</span>
                        ${buttonHTML}
                    </div>
                </div>`;
            }).join('');
        }

        function toggleCart(id) {
            const idx = cart.indexOf(id);
            if (idx > -1) cart.splice(idx, 1); else cart.push(id);
            localStorage.setItem('kp_cart', JSON.stringify(cart));
            renderGrid();
        }

        function setupPayPal() {
            paypal.Buttons({
                createOrder: (data, actions) => {
                    return actions.order.create({
                        purchase_units: [{ amount: { value: '20.00' }, description: 'Gallery Access: ' + gId }]
                    });
                },
                onApprove: (data, actions) => {
                    return actions.order.capture().then(details => {
                        localStorage.setItem('kp_paid_id', gId); // Unlock this gallery
                        isPaid = true;
                        document.getElementById('payment-success').style.display = 'flex';
                        renderGrid();
                        document.getElementById('paypal-container').style.display = 'none';
                    });
                }
            }).render('#paypal-container');
        }

        function closeSuccess() { document.getElementById('payment-success').style.display = 'none'; }
        
        init();
    </script>
</body>
</html>
